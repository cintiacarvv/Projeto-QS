<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Meus Livros</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <div>
            <h2>Meus Livros</h2>
            <span class="book-count"
                  th:unless="${books.empty}"
                  th:text="${books.size()} + ' obra(s) na coleção'"></span>
        </div>
        <a th:href="@{/books/add}" class="btn btn-primary">
            + Adicionar Livro
        </a>
    </div>

    <div class="glass-card">

        <!-- VAZIO -->
        <div th:if="${books.empty}" class="empty-state">
            <div class="empty-icon">📖</div>
            <p>Sua coleção está vazia por enquanto.</p>
            <a th:href="@{/books/add}" class="btn btn-primary">Adicionar primeiro livro</a>
        </div>

        <!-- TABELA -->
        <table class="table" th:unless="${books.empty}">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Ano</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.title}">Título</td>
                    <td th:text="${book.author}" style="color:var(--txt2);">Autor</td>
                    <td th:text="${book.publishedYear}" style="color:var(--txt2);">Ano</td>
                    <td>
                        <span th:if="${book.read}"     class="badge badge-read">Lido</span>
                        <span th:unless="${book.read}" class="badge badge-pending">Pendente</span>
                    </td>
                    <td>
                        <div class="table-actions">
                            <a th:href="@{/books/edit/{id}(id=${book.id})}"
                               class="btn btn-secondary btn-sm">Editar</a>
                            <a th:href="@{/books/delete/{id}(id=${book.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Excluir este livro da coleção?');">Excluir</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</div>
</body>
</html>
