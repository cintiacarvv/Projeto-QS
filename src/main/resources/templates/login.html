<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Biblioteca Pessoal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="justify-content: center; align-items: center;">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <h1 style="text-align: center; margin-bottom: 2rem;">Biblioteca</h1>
        
        <div th:if="${param.error}" class="alert alert-danger">
            Usuário ou senha inválidos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            Você saiu com sucesso.
        </div>
        <div th:if="${param.registered}" class="alert alert-success">
            Registro concluído com sucesso. Faça login!
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;">
            Não tem uma conta? <a th:href="@{/register}" style="color: var(--secondary);">Registre-se</a>
        </p>
    </div>
</body>
</html>
