<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Biblioteca Pessoal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

    <div class="auth-wrapper">

        <div class="auth-header">
            <h1>Bem-vindo</h1>
            <p>Acesse sua biblioteca pessoal</p>
        </div>

        <div class="auth-card">

            <div th:if="${param.error}"      class="alert alert-danger">Usuário ou senha inválidos.</div>
            <div th:if="${param.logout}"     class="alert alert-success">Você saiu com sucesso.</div>
            <div th:if="${param.registered}" class="alert alert-success">Conta criada! Faça login para continuar.</div>

            <form th:action="@{/login}" method="post">

                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="Digite o seu usuário" required autofocus autocomplete="username">
                </div>

                <div class="form-group" style="margin-bottom:0;">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.5rem; padding-block:.85rem; font-size:1rem;">
                    Entrar
                </button>

            </form>
        </div>

        <p class="auth-footer">
            Não tem uma conta? <a th:href="@{/register}">Criar conta</a>
        </p>

    </div>

</body>
</html>
