<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Pessoal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar" sec:authorize="isAuthenticated()">
        <a href="/books" class="navbar-brand">Biblioteca Pessoal</a>
        <div class="nav-links">
            <span sec:authentication="name" style="margin-right: 15px; color: var(--secondary);"></span>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Sair</button>
            </form>
        </div>
    </nav>
    <main class="container">
        <div layout:fragment="content"></div>
    </main>
</body>
</html>
